worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # gzip text; don't gzip media.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream app_backend  { server app:8000; }
    upstream srs_http     { server srs:8080; }
    upstream srs_api      { server srs:1985; }

    # --- Shared CORS preflight response for media ---
    map $request_method $cors_method {
        OPTIONS 1;
        default 0;
    }

    server {
        listen       80;
        server_name  _;

        # --------------------------------------------------------
        # HTTP-FLV / HLS served directly by SRS
        # --------------------------------------------------------
        location ~* \.(flv|m3u8|ts)$ {
            proxy_pass http://srs_http;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_request_buffering off;
            add_header Access-Control-Allow-Origin  *;
            add_header Cache-Control no-cache;
        }

        # --------------------------------------------------------
        # WebRTC WHIP/WHEP signaling to SRS HTTP API
        # --------------------------------------------------------
        location /rtc/ {
            proxy_pass http://srs_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization';
            if ($request_method = OPTIONS) { return 204; }
        }

        # --------------------------------------------------------
        # WebSocket: chat
        # --------------------------------------------------------
        location /api/chat/ws/ {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
        }

        # --------------------------------------------------------
        # All other app HTTP (API + SPA + hooks endpoints).
        # Hooks from SRS (inside the docker network) usually call
        # http://app:8000 directly, but we expose them here as well
        # so you may configure SRS to call nginx if desired.
        # --------------------------------------------------------
        location / {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
