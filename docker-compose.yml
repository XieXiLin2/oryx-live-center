version: "3.8"

services:
  app:
    build: .
    container_name: oryx-live-center
    restart: unless-stopped
    ports:
      - "3000:8000"
    volumes:
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - DEBUG=false
      - ORYX_API_URL=http://oryx:2022
      - ORYX_HTTP_URL=http://oryx:2022
    depends_on:
      - redis
      - oryx

  oryx:
    image: ossrs/oryx:5
    container_name: oryx-live-center-oryx
    restart: unless-stopped
    ports:
      - "1935:1935"       # RTMP push
      - "8000:8000/udp"   # WebRTC UDP
      - "10080:10080/udp" # SRT UDP
    volumes:
      - oryx-data:/data
    environment:
      - CANDIDATE=${CANDIDATE:-}
      - REACT_APP_LOCALE=zh
      - MGMT_PASSWORD=${ORYX_MGMT_PASSWORD:-}

  redis:
    image: redis:7-alpine
    container_name: oryx-live-center-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  app-data:
  redis-data:
  oryx-data:
